<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Cajas - Dulce App</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <meta name="theme-color" content="#ff96c5">
    <style>
        .caja-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .caja-estado {
            padding: 0.2rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .estado-abierta { background-color: #dbeafe; color: #1e3a8a; border: 1px solid #bfdbfe; }
        .estado-cerrada { background-color: #f3f4f6; color: #4b5563; border: 1px solid #e5e7eb; }
        
        .caja-resumen {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
            padding: 1rem;
            background: var(--secondary-bg);
            border-radius: var(--radius-md);
        }
        .caja-resumen-item {
            display: flex;
            flex-direction: column;
        }
        .caja-resumen-item span:first-child {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
        }
        .caja-resumen-item span:last-child {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
        }
        
        .ticket-list {
            margin-top: 1.5rem;
            border-top: 2px dashed var(--border-color);
            padding-top: 1rem;
        }
        .ticket-item {
            background: white;
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ticket-info h4 { margin: 0 0 0.2rem 0; font-size: 0.95rem; }
        .ticket-info p { margin: 0; font-size: 0.8rem; color: var(--text-light); }
        .ticket-monto { font-weight: bold; color: var(--primary-color); }
        .metodo-pago-tag {
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 4px;
            background: #f1f5f9;
            color: #475569;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="header">
            <button class="header__menu-icon" id="menu-toggle-btn" aria-label="Abrir menú">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="header__logo-link">
                <img src="assets/logo.png" alt="Logo de Dulce App" class="header__logo">
            </a>
            <div class="header__spacer"></div>
        </header>

        <nav class="nav-menu" id="nav-menu">
            <div class="nav-menu__header">
                <img src="assets/logo.png" alt="Logo" class="header__logo" style="height: 40px;">
                <span class="nav-menu__title">Dulce App</span>
            </div>
            <a href="index.html" class="nav-menu__link"><span>📊</span> Indicadores</a>
            <a href="finanzas.html" class="nav-menu__link"><span>💰</span> Finanzas</a> 
            <a href="pos.html" class="nav-menu__link"><span>🏪</span> Mostrador</a>
            <a href="cajas.html" class="nav-menu__link active"><span>🗃️</span> Historial Cajas</a>
            <a href="recetas.html" class="nav-menu__link"><span>🍰</span> Postres</a>
            <a href="clientes.html" class="nav-menu__link"><span>👥</span> Clientes</a>
            <a href="agenda.html" class="nav-menu__link"><span>🗓️</span> Agenda</a>
            <a href="compras-lista.html" class="nav-menu__link"><span>🛒</span> Lista de Compras</a>
            <a href="presupuesto.html" class="nav-menu__link"><span>🧾</span> Presupuesto</a>
            <a href="stock.html" class="nav-menu__link"><span>📦</span> Stock</a>
            <a href="historial.html" class="nav-menu__link"><span>📚</span> Historial</a>
            <a href="compras.html" class="nav-menu__link"><span>🛍️</span> Registrar Compra</a>
            <a href="precios.html" class="nav-menu__link"><span>💲</span> Lista de Precios</a>
            <a href="modelos.html" class="nav-menu__link"><span>🎨</span> Modelos 3D</a>
        </nav>        
        <div class="nav-menu__overlay" id="nav-overlay"></div>

        <main>
            <h1 class="header__slogan">Historial de Cajas</h1>
            
            <section class="card" style="margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="filtro-mes-cajas">Filtrar por Mes:</label>
                    <select id="filtro-mes-cajas" style="max-width: 300px;">
                        </select>
                </div>
            </section>

            <section id="lista-cajas-container">
                <p class="text-light" style="text-align: center; margin-top: 2rem;">Cargando historial de cajas...</p>
            </section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { firebaseConfig } from './js/firebase-config.js';
        import { setupCajas } from './js/cajas.js';
        try {
            const app = initializeApp(firebaseConfig);
            setupCajas(app);
        } catch (error) { 
            console.error("Error al inicializar Cajas:", error); 
        }
    </script>
    <script src="js/menu.js" defer></script>
</body>
</html>
